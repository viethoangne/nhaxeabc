version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: nha_xe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: nha_xe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nha_xe_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
